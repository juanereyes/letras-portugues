<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Entrar | Português com Música</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html#home" aria-label="Página inicial de Português com Música">
        <span class="brand-mark">PT</span>
        <span>
          <strong>Português com Música</strong>
          <small>Prática de língua</small>
        </span>
      </a>

      <nav class="topnav" aria-label="Navegação principal">
        <a href="index.html#songs">Músicas</a>
        <a href="progress.html">Progresso</a>
      </nav>
    </header>

    <main class="auth-page">
      <section class="auth-panel" aria-labelledby="authTitle">
        <p class="eyebrow">Conta do estudante</p>
        <h1 id="authTitle">Entrar ou criar conta</h1>

        <form id="authForm" class="auth-form">
          <label for="authUsername">Usuário</label>
          <input id="authUsername" name="username" type="text" autocomplete="username" required />

          <label for="authPassword">Senha</label>
          <input id="authPassword" name="password" type="password" autocomplete="current-password" minlength="8" required />

          <p id="authFeedback" class="game-feedback" aria-live="polite"></p>

          <div class="game-actions">
            <button class="primary-action" type="submit">Entrar</button>
            <button id="registerButton" class="secondary-action" type="button">Criar conta</button>
          </div>
        </form>
      </section>
    </main>

    <script src="backend.js"></script>
    <script src="login.js"></script>
  </body>
</html>
